<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/kablock/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#BFE9FF">
  <meta name="description" content="KABLOCK — a slick block-sliding puzzle. Slide blocks to their matching gates, sweep gems, chain combos.">

  <!-- Open Graph / share -->
  <meta property="og:title" content="KABLOCK">
  <meta property="og:description" content="Slide blocks to their matching gates, sweep gems, chain combos.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons — launch fullscreen (no Safari chrome) from the home
       screen. apple-mobile-web-app-capable covers iOS < 16.4; mobile-web-app-capable
       covers newer iOS + Android/Chrome. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KABLOCK">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon (crisp vector, with PNG fallback) -->
  <link rel="icon" type="image/svg+xml" href="icon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <title>KABLOCK</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* neon-dark brand base from the first paint — no white flash before Flutter boots */
    html, body { margin: 0; padding: 0; height: 100%; background-color: #BFE9FF; overflow: hidden; }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
