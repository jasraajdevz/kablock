<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="kb-bg" cx="50%" cy="44%" r="75%">
      <stop offset="0" stop-color="#0C2233"/>
      <stop offset="0.6" stop-color="#060910"/>
      <stop offset="1" stop-color="#04060C"/>
    </radialGradient>
    <linearGradient id="kb-blk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9DEEFF"/>
      <stop offset="0.5" stop-color="#22E6FF"/>
      <stop offset="1" stop-color="#0C9AD0"/>
    </linearGradient>
    <filter id="kb-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- neon-dark brand base -->
  <rect width="64" height="64" rx="14" fill="url(#kb-bg)"/>

  <!-- contained cyan glow hugging the K -->
  <g filter="url(#kb-glow)" opacity="0.5" fill="#22E6FF">
    <rect x="17.5" y="17.5" width="9.7" height="9.7" rx="2"/>
    <rect x="17.5" y="27.5" width="9.7" height="9.7" rx="2"/>
    <rect x="17.5" y="37.4" width="9.7" height="9.7" rx="2"/>
    <rect x="27.7" y="22.3" width="9.2" height="9.2" rx="2"/>
    <rect x="37.0" y="14.9" width="9.2" height="9.2" rx="2"/>
    <rect x="27.7" y="33.2" width="9.2" height="9.2" rx="2"/>
    <rect x="37.0" y="40.5" width="9.2" height="9.2" rx="2"/>
  </g>

  <!-- the K, built from interlocking cyan blocks (stem + two staircase arms) -->
  <g fill="url(#kb-blk)" stroke="#CFF8FF" stroke-width="0.8">
    <rect x="17.5" y="17.5" width="9.7" height="9.7" rx="2"/>
    <rect x="17.5" y="27.5" width="9.7" height="9.7" rx="2"/>
    <rect x="17.5" y="37.4" width="9.7" height="9.7" rx="2"/>
    <rect x="27.7" y="22.3" width="9.2" height="9.2" rx="2"/>
    <rect x="37.0" y="14.9" width="9.2" height="9.2" rx="2"/>
    <rect x="27.7" y="33.2" width="9.2" height="9.2" rx="2"/>
    <rect x="37.0" y="40.5" width="9.2" height="9.2" rx="2"/>
  </g>
</svg>
